<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Guru Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f0f2f5; margin: 0; color: #333; }
        .table-container { background: white; padding: 20px; border-radius: 10px; margin: 20px auto; max-width: 1100px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #343a40; color: white; }
        .btn { padding: 8px 15px; border: none; border-radius: 5px; cursor: pointer; color: white; font-weight: bold; text-decoration: none;}
        .btn-blue { background: #007bff; } .btn-blue:hover { background: #0056b3; }
        .btn-green { background: #28a745; }
    </style>
</head>
<body>

    <div style="text-align: center; padding: 20px;">
        <h1>Rekapitulasi Nilai Siswa</h1>
        <button class="btn btn-green" onclick="fetchData()"><i class="fa-solid fa-rotate"></i> Refresh Data</button>
    </div>

    <div class="table-container">
        <p id="statusLoading">Mengambil data...</p>
        <table id="mainTable">
            <thead>
                <tr>
                    <th>Nama Siswa</th>
                    <th>Waktu Submit</th>
                    <th>Skor</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <script>
        const supabaseUrl = 'https://cydgsvqybhhfedoazfok.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN5ZGdzdnF5YmhoZmVkb2F6Zm9rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc4NDc5ODAsImV4cCI6MjA4MzQyMzk4MH0.4p4It2z4qVyLNydXwNdOHx9es7R5zAbB-EevFZVk5Y8';

        async function fetchData() {
            const status = document.getElementById('statusLoading');
            status.textContent = "Sedang memuat...";
            
            try {
                const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
                const { data, error } = await supabase.from('student_answers').select('*').order('created_at', { ascending: false });
                if (error) throw error;
                processAndRender(data);
                status.textContent = "";
            } catch (err) { console.error(err); status.textContent = "Gagal memuat data."; }
        }

        function processAndRender(data) {
            const tableBody = document.getElementById('tableBody');
            tableBody.innerHTML = "";
            if (data.length === 0) { tableBody.innerHTML = "<tr><td colspan='4'>Belum ada data.</td></tr>"; return; }

            const students = {};
            data.forEach(row => {
                if (!students[row.student_name]) {
                    students[row.student_name] = { name: row.student_name, lastSubmit: row.created_at, correct: 0, wrong: 0 };
                }
                if (row.is_correct) students[row.student_name].correct++;
                else students[row.student_name].wrong++;
            });

            Object.values(students).forEach(student => {
                const tr = document.createElement('tr');
                // MEMBUAT LINK KHUSUS YANG MENGIRIM NAMA SISWA KE INDEX.HTML
                const linkReview = `index.html?siswa=${encodeURIComponent(student.name)}`;

                tr.innerHTML = `
                    <td style="font-weight:bold;">${student.name}</td>
                    <td>${new Date(student.lastSubmit).toLocaleString('id-ID')}</td>
                    <td><span style="color:green">${student.correct} Benar</span> / <span style="color:red">${student.wrong} Salah</span></td>
                    <td>
                        <a href="${linkReview}" target="_blank" class="btn btn-blue">
                            <i class="fa-solid fa-file-signature"></i> Lihat LKPD Siswa
                        </a>
                    </td>
                `;
                tableBody.appendChild(tr);
            });
        }
        
        // Auto load saat dibuka
        fetchData();
    </script>
</body>
</html>
